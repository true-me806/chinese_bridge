<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>卢沟桥图解</title><script type=importmap>{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Microsoft Yahei",serif;background-color:#f8f5f0;color:#333}.container{max-width:1200px;margin:0 auto;padding:20px}.model-section{width:100%;height:300px;background-color:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);margin-bottom:30px;position:relative;overflow:hidden}#model-container{width:100%;height:100%}.model-tip{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:12px;color:#666;background:rgba(255,255,255,.8);padding:4px 12px;border-radius:12px}.content-section{background:url(img/背景1.png) no-repeat center center;background-size:cover;padding:40px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);position:relative}.title{font-size:48px;font-weight:700;writing-mode:vertical-rl;position:absolute;left:20px;top:40px;color:#222;text-shadow:2px 2px 4px rgba(0,0,0,.2)}.info-box{margin-left:80px;max-width:600px;background:rgba(255,255,255,.85);padding:20px;border-radius:8px;line-height:1.8}.info-box p{margin-bottom:10px;font-size:14px}.bridge-img{margin-top:20px;width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15)}@media (max-width:768px){.title{writing-mode:horizontal-tb;position:static;text-align:center;margin-bottom:20px}.info-box{margin-left:0}}</style></head><body><div class=container><div class=model-section><div id=model-container></div><div class=model-tip>卢沟桥3D模型</div></div><div class=content-section><div class=title>卢沟桥</div><div class=info-box><pre>《过卢沟桥》——陈毅
卢沟桥畔硝烟起，永定河边战马鸣。
八载干戈凝碧血，千秋伟业赖群英.</pre><img src=img/卢沟桥/卢沟桥.png alt=卢沟桥实景 class=bridge-img></div></div></div><script type=module>import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';const scene=new THREE.Scene();scene.background=new THREE.Color(0xf8f5f0);const camera=new THREE.PerspectiveCamera(50,document.getElementById('model-container').clientWidth/document.getElementById('model-container').clientHeight,0.1,1000);camera.position.set(0,5,20);const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(document.getElementById('model-container').clientWidth,document.getElementById('model-container').clientHeight);renderer.shadowMap.enabled=!0;document.getElementById('model-container').appendChild(renderer.domElement);const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=!0;controls.dampingFactor=.05;controls.minDistance=5;controls.maxDistance=50;const ambientLight=new THREE.AmbientLight(16777215,.6);scene.add(ambientLight);const directionalLight=new THREE.DirectionalLight(16777215,.8);directionalLight.position.set(10,20,10);directionalLight.castShadow=!0;scene.add(directionalLight);const loader=new GLTFLoader();loader.load('建模/lugoubridge.glb',gltf=>{const model=gltf.scene;model.scale.set(25,25,25);scene.add(model)},xhr=>{console.log(`模型加载进度: ${(xhr.loaded/xhr.total*100).toFixed(1)}%`)},error=>{console.error('模型加载失败:',error)});window.addEventListener('resize',()=>{const width=document.getElementById('model-container').clientWidth;const height=document.getElementById('model-container').clientHeight;camera.aspect=width/height;camera.updateProjectionMatrix();renderer.setSize(width,height)});function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}animate();</script></body></html>
