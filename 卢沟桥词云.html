<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><title>卢沟桥词云</title><style>body,html{margin:0;padding:0;height:100%;background:#000}#container{width:100%;height:100%}</style></head><body><div id=container></div><script src=https://unpkg.com/three@0.128.0/build/three.min.js></script><script src=https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js></script><script>const textList=["卢沟桥","永定河","北京","丰台区","石拱桥","联拱石桥","石狮","雕刻","形态各异","栩栩如生","望柱","栏板","历史","抗战","纪念","名胜","古迹","文物","坚固","美观","悠久","闻名","建筑","奇迹","狮子","大小","母子","嬉戏","凝望","守护"];const scene=new THREE.Scene;const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(window.innerWidth,window.innerHeight);document.getElementById("container").appendChild(renderer.domElement);const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=!0;controls.dampingFactor=0.05;camera.position.z=300;const group=new THREE.Group;scene.add(group);const cubeSize=200;const faces=[{dir:new THREE.Vector3(0,0,1)},{dir:new THREE.Vector3(0,0,-1)},{dir:new THREE.Vector3(-1,0,0)},{dir:new THREE.Vector3(1,0,0)},{dir:new THREE.Vector3(0,1,0)},{dir:new THREE.Vector3(0,-1,0)}];textList.forEach((e,t)=>{const i=document.createElement("canvas");const o=i.getContext("2d");i.width=256;i.height=256;o.clearRect(0,0,256,256);o.font="bold 40px Microsoft YaHei";o.fillStyle=`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;o.textAlign="center";o.fillText(e,128,140);const n=new THREE.CanvasTexture(i);const a=new THREE.SpriteMaterial({map:n});const s=new THREE.Sprite(a);const r=faces[t%faces.length];const d=(Math.random()-0.5)*cubeSize*0.8;const l=(Math.random()-0.5)*cubeSize*0.8;s.position.copy(r.dir).multiplyScalar(cubeSize/2);s.position.x+=(r.dir.z===1||r.dir.z===-1)?d:0;s.position.y+=(r.dir.x===1||r.dir.x===-1)?l:d;s.position.z+=(r.dir.y===1||r.dir.y===-1)?l:0;s.scale.set(80,40,1);group.add(s)});function animate(){requestAnimationFrame(animate);group.rotation.y+=0.006;group.rotation.x+=0.003;controls.update();renderer.render(scene,camera)}animate();window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)})</script></body></html>
