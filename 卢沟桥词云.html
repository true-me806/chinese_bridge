<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<title>卢沟桥词云</title>
		<style>
			html,body{ margin:0; padding:0; height:100%; background:black }
			#container{ width:100%; height:100%; }
		</style>
	</head>

	<body>
		<div id="container"></div>

		<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

		<script>
			// 卢沟桥关键词（已替换）
			const textList = [
			'卢沟桥','永定河','北京','丰台区','石拱桥','联拱石桥',
			'石狮','雕刻','形态各异','栩栩如生','望柱','栏板',
			'历史','抗战','纪念','名胜','古迹','文物',
			'坚固','美观','悠久','闻名','建筑','奇迹',
			'狮子','大小','母子','嬉戏','凝望','守护'
			];

			// 基础场景配置
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
			const renderer = new THREE.WebGLRenderer({ antialias:true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			document.getElementById("container").appendChild(renderer.domElement);

			// 鼠标控制
			const controls = new THREE.OrbitControls(camera, renderer.domElement);
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;

			camera.position.z = 300;

			const group = new THREE.Group();
			scene.add(group);

			// 立方体边长
			const cubeSize = 200;
			// 六个面的方向向量（前、后、左、右、上、下）
			const faces = [
				{ dir: new THREE.Vector3(0, 0, 1) },  // 前
				{ dir: new THREE.Vector3(0, 0, -1) }, // 后
				{ dir: new THREE.Vector3(-1, 0, 0) }, // 左
				{ dir: new THREE.Vector3(1, 0, 0) },  // 右
				{ dir: new THREE.Vector3(0, 1, 0) },  // 上
				{ dir: new THREE.Vector3(0, -1, 0) }   // 下
			];

			// 生成3D立方体文字
			textList.forEach((text, i) => {
				// 创建文字画布
				const fontCanvas = document.createElement('canvas');
				const fontCtx = fontCanvas.getContext('2d');
				fontCanvas.width = 256;
				fontCanvas.height = 256;
				fontCtx.clearRect(0, 0, 256, 256);
				fontCtx.font = "bold 40px Microsoft YaHei";
				// 随机彩色文字
				fontCtx.fillStyle = `rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255})`;
				fontCtx.textAlign = "center";
				fontCtx.fillText(text, 128, 140);

				// 创建文字精灵
				const texture = new THREE.CanvasTexture(fontCanvas);
				const material = new THREE.SpriteMaterial({ map: texture });
				const sprite = new THREE.Sprite(material);

				// 均匀分配到立方体6个面
				const face = faces[i % faces.length];
				// 随机偏移位置，让文字不重叠
				const offsetX = (Math.random() - 0.5) * cubeSize * 0.8;
				const offsetY = (Math.random() - 0.5) * cubeSize * 0.8;

				// 设置立方体表面位置
				sprite.position.copy(face.dir).multiplyScalar(cubeSize / 2);
				sprite.position.x += (face.dir.z === 1 || face.dir.z === -1) ? offsetX : 0;
				sprite.position.y += (face.dir.x === 1 || face.dir.x === -1) ? offsetY : offsetX;
				sprite.position.z += (face.dir.y === 1 || face.dir.y === -1) ? offsetY : 0;

				// 文字大小
				sprite.scale.set(80, 40, 1);
				group.add(sprite);
			});

			// 自动旋转 + 渲染
			function animate(){
				requestAnimationFrame(animate);
				group.rotation.y += 0.006;
				group.rotation.x += 0.003;
				controls.update();
				renderer.render(scene, camera);
			}
			animate();

			// 窗口自适应
			window.addEventListener('resize', ()=>{
				camera.aspect = window.innerWidth/window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
			});
		</script>
	</body>
</html>
