<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><title>小A同学</title><link rel="shortcut icon" type=image/x-icon href=img/logo.ico><style>*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}body{background-image:url(img/小A同学/守其意2.png);padding:20px}.container{max-width:800px;margin:0 auto;background:rgba(255,255,255,.6);padding:30px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,.1)}h1{text-align:center;color:#2c3e50;margin-bottom:20px}.chat-box{height:600px;border:1px solid #ddd;border-radius:8px;padding:15px;overflow-y:auto;margin-bottom:15px;background:rgba(250,250,250,.8)}.msg{margin:10px 0;padding:10px 14px;border-radius:8px;max-width:75%}.user{background:rgba(67,146,231,.6);color:#fff;margin-left:auto}.ai{background:rgba(233,236,239,.6);color:#333}.input-area{display:flex;gap:10px}input{flex:1;padding:12px 15px;border:1px solid #ddd;border-radius:8px;font-size:16px}.send-btn{width:80px;height:50px;background:#689ed8;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s ease}.send-btn:hover{background:#629bd7;transform:scale(1.05)}.bank-btn{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.3);backdrop-filter:blur(5px);color:#fff;font-size:18px;font-weight:700;border:2px solid rgba(255,255,255,.5);box-shadow:0 5px 15px rgba(0,0,0,.2);cursor:pointer;transition:all .3s ease}.bank-btn:hover{background:rgba(255,255,255,.5);transform:scale(1.1);box-shadow:0 8px 20px rgba(0,0,0,.3)}.bank-container{position:fixed;top:5px;left:5px;z-index:9999}.bank-nav-bar{position:absolute;top:100%;left:0;margin-top:10px;display:flex;flex-direction:column;background:rgba(255,255,255,.3);backdrop-filter:blur(5px);border:2px solid rgba(255,255,255,.5);border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);padding:8px;opacity:0;visibility:hidden;transition:all .3s ease;transform:translateY(-20px)}.bank-container:hover .bank-nav-bar{opacity:1;visibility:visible;transform:translateY(0)}.bank-nav-btn{padding:10px 15px;background:0 0;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .3s ease}.bank-nav-btn:hover{background:rgba(255,255,255,.5);transform:scale(1.05)}</style></head><body><div class=bank-container><button class=bank-btn onclick=window.history.back()>BANK</button><div class=bank-nav-bar><a class=bank-nav-btn href=zhaozhoubridge.html>赵州桥</a><a class=bank-nav-btn href=luoyangbridge.html>洛阳桥</a><a class=bank-nav-btn href=lugoubridge.html>卢沟桥</a><a class=bank-nav-btn href=index.html>首页</a></div></div><div class=container><h1>小A同学</h1><div class=chat-box id=chatBox></div><div class=input-area><input id=userInput placeholder="问我关于赵州桥、卢沟桥、洛阳桥的桥梁问题…"><button class=send-btn onclick=sendMsg()>发送</button></div></div><script>const bridgeKnowledge={zhaozhou:{"谁建的":"赵州桥由隋朝工匠李春设计建造，是世界现存最早、保存最完整的单孔石拱桥。","什么时候":"建于隋朝开皇大业年间（约公元595—605年），距今已有1400多年。","在哪里":"位于河北省石家庄市赵县。","特点":"单孔、敞肩拱、结构轻巧、抗震强、千年不塌。","为什么有名":"是中国古代桥梁巅峰之作，开创了敞肩拱型，比欧洲早1200多年。","长度":"全长50.82米，跨径37.02米。","材料":"全部用青石建成。","历史价值":"全国重点文物、世界历史文化遗产级别的古代工程奇迹。"},luoyang:{"谁建的":"由北宋名臣蔡襄主持建造，是中国古代跨海桥梁工程的典范之作。","什么时候":"始建于北宋皇祐五年（公元1053年），完工于嘉祐四年（公元1059年），历时6年建成，距今近1000年。","在哪里":"位于福建省泉州市洛阳江入海口，是古代海上丝绸之路的重要交通节点。","特点":"筏型基础、种蛎固基、船形桥墩、跨海梁式结构，是世界最早将生物加固技术应用于桥梁工程的案例。","为什么有名":"中国现存最早的跨海梁式石桥，被誉为“福建桥梁的状元”，其建桥技术领先世界数百年，见证了泉州港的繁荣。","长度":"全长约731米，宽4.5米，共有44座船形桥墩。","材料":"以花岗岩条石为主要建筑材料，桥基与桥墩利用牡蛎胶结加固。","历史价值":"全国重点文物保护单位，“泉州：宋元中国的世界海洋商贸中心”世界文化遗产重要组成部分。"},lugou:{"谁建的":"卢沟桥由金代工匠主持建造，是北京现存最古老的石造联拱桥，也是中国北方联拱石桥的代表。","什么时候":"始建于金大定二十九年（公元1189年），完工于明昌三年（公元1192年），距今已有800多年历史。","在哪里":"位于北京市丰台区永定河上，是北京西南重要的交通与历史地标。","特点":"11孔联拱、石雕护栏、501尊形态各异的石狮、桥身坚固、抗洪水冲击能力强。","为什么有名":"不仅是中国古代桥梁建筑的杰作，更是“七七事变”的发生地，是中国全民族抗战的起点，承载着厚重的民族记忆。","长度":"全长266.5米，宽7.5米，桥身共有11个半圆形石拱。","材料":"桥身以天然花岗岩为主要材料，护栏与石狮采用青石精雕而成。","历史价值":"全国重点文物保护单位，中国人民抗日战争重要纪念地，世界文化遗产预备名单项目。"}};function sendMsg(){const input=document.getElementById("userInput");const text=input.value.trim();if(!text)return;addMsg(text,"user");input.value="";setTimeout(()=>{let answer=matchAnswer(text);addMsg(answer,"ai")},600)}function matchAnswer(text){let bridgeType=null;if(text.includes("赵州桥")||text.includes("zhaozhou")){bridgeType="zhaozhou"}else if(text.includes("洛阳桥")||text.includes("luoyang")){bridgeType="luoyang"}else if(text.includes("卢沟桥")||text.includes("lugou")){bridgeType="lugou"}if(bridgeType){for(let key in bridgeKnowledge[bridgeType]){if(text.includes(key)||key.includes(text)){return bridgeKnowledge[bridgeType][key]}}return"关于"+(bridgeType==="zhaozhou"?"赵州桥":bridgeType==="luoyang"?"洛阳桥":"卢沟桥")+"的这个问题，我还在学习中~"}return"我正在学习中~"}function addMsg(content,cls){const box=document.getElementById("chatBox");const div=document.createElement("div");div.className="msg "+cls;div.innerText=content;box.appendChild(div);box.scrollTop=box.scrollHeight}window.onload=function(){addMsg("我是小A同学，你可以问我：谁建的、什么时候建的、在哪里、特点、长度、历史价值等~","ai")}</script></body></html>
