<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><title>词云</title><style>body,html{margin:0;padding:0;height:100%;background:#000}#container{width:100%;height:100%}</style></head><body><div id=container></div><script src=https://unpkg.com/three@0.128.0/build/three.min.js></script><script src=https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js></script><script>const textList=["世界闻名","雄伟","坚固","美观","创举","李春","隋朝","河北省","赵县","洨河","石拱桥","大桥洞","小桥洞","拱形","设计","图案","栏板","雕刻","缠绕","回首","遥望","双龙戏珠","游动","吐水","智慧","才干","宝贵","遗产","历史","劳动人民"];const scene=new THREE.Scene;const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(window.innerWidth,window.innerHeight);document.getElementById("container").appendChild(renderer.domElement);const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=!0;controls.dampingFactor=0.05;camera.position.z=300;const group=new THREE.Group;scene.add(group);textList.forEach((e,t)=>{const i=document.createElement("canvas");const o=i.getContext("2d");i.width=256,i.height=256,o.clearRect(0,0,256,256),o.font="bold 40px Microsoft YaHei",o.fillStyle=`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`,o.textAlign="center",o.fillText(e,128,140);const n=new THREE.CanvasTexture(i),s=new THREE.SpriteMaterial({map:n}),r=new THREE.Sprite(s);const a=Math.acos(-1+2*t/textList.length),h=Math.sqrt(textList.length*Math.PI)*a,d=150;r.position.set(d*Math.sin(a)*Math.cos(h),d*Math.sin(a)*Math.sin(h),d*Math.cos(a)),r.scale.set(80,40,1),group.add(r)});function animate(){requestAnimationFrame(animate),group.rotation.y+=0.008,controls.update(),renderer.render(scene,camera)}animate();window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight,camera.updateProjectionMatrix(),renderer.setSize(window.innerWidth,window.innerHeight)});</script></body></html>
