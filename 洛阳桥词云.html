<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<title>洛阳桥 3D词云</title>
		<style>
			html,body{ margin:0; padding:0; height:100%; background:#0a1028 }
			#container{ width:100%; height:100%; }
		</style>
	</head>

	<body>
		<div id="container"></div>

		<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

		<script>
			// 洛阳桥关键词
			const textList = [
			'洛阳桥','泉州','万安桥','蔡襄','宋代',
			'跨海石桥','跨海梁式','石墩','牡蛎固基','筏型基础',
			'文物','国保','古桥','历史','千年',
			'闽南','建筑','奇迹','坚固','壮观',
			'桥梁','遗产','文化','海港','工程',
			'石板','望柱','栏板','纪念','名胜'
			];

			// 基础场景
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
			const renderer = new THREE.WebGLRenderer({ antialias:true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			document.getElementById("container").appendChild(renderer.domElement);

			// 鼠标控制
			const controls = new THREE.OrbitControls(camera, renderer.domElement);
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;
			camera.position.z = 350;

			const group = new THREE.Group();
			scene.add(group);

			// ======================
			// 随机球形分布（非立方体）
			// ======================
			function getRandomSpherePosition(radius) {
				let phi = Math.random() * Math.PI * 2;
				let costheta = Math.random() * 2 - 1;
				let u = Math.random();

				let theta = Math.acos(costheta);
				let r = radius * Math.cbrt(u);

				let x = r * Math.sin(theta) * Math.cos(phi);
				let y = r * Math.sin(theta) * Math.sin(phi);
				let z = r * Math.cos(theta);

				return new THREE.Vector3(x, y, z);
			}

			// 生成文字
			textList.forEach((text) => {
				// 画布
				const canvas = document.createElement('canvas');
				const ctx = canvas.getContext('2d');
				canvas.width = 256;
				canvas.height = 256;
				ctx.font = "bold 42px Microsoft YaHei";
				
				// 随机彩色文字
				const r = 50 + Math.random() * 205 | 0;
				const g = 100 + Math.random() * 155 | 0;
				const b = 180 + Math.random() * 75 | 0;
				ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
				ctx.textAlign = "center";
				ctx.fillText(text, 128, 140);

				// 精灵材质
				const texture = new THREE.CanvasTexture(canvas);
				const sprite = new THREE.Sprite(
					new THREE.SpriteMaterial({ map: texture, transparent: true })
				);

				// ===== 关键：随机球形位置 =====
				let pos = getRandomSpherePosition(200);
				sprite.position.copy(pos);
				sprite.scale.set(80, 40, 1);
				group.add(sprite);
			});

			// 自动旋转
			function animate(){
				requestAnimationFrame(animate);
				group.rotation.y += 0.004;
				controls.update();
				renderer.render(scene, camera);
			}
			animate();

			// 自适应
			window.addEventListener('resize', ()=>{
				camera.aspect = window.innerWidth/window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
			});
		</script>
	</body>
</html>
