<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><title>洛阳桥 3D词云</title><style>body,html{margin:0;padding:0;height:100%;background:#0a1028}#container{width:100%;height:100%}</style></head><body><div id=container></div><script src=https://unpkg.com/three@0.128.0/build/three.min.js></script><script src=https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js></script><script>const textList=["洛阳桥","泉州","万安桥","蔡襄","宋代","跨海石桥","跨海梁式","石墩","牡蛎固基","筏型基础","文物","国保","古桥","历史","千年","闽南","建筑","奇迹","坚固","壮观","桥梁","遗产","文化","海港","工程","石板","望柱","栏板","纪念","名胜"];const scene=new THREE.Scene;const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(window.innerWidth,window.innerHeight);document.getElementById("container").appendChild(renderer.domElement);const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=!0;controls.dampingFactor=0.05;camera.position.z=350;const group=new THREE.Group;scene.add(group);function getRandomSpherePosition(e){let t=Math.random()*Math.PI*2;let n=Math.random()*2-1;let i=Math.random();let o=Math.acos(n);let a=e*Math.cbrt(i);let r=a*Math.sin(o)*Math.cos(t);let s=a*Math.sin(o)*Math.sin(t);let l=a*Math.cos(o);return new THREE.Vector3(r,s,l)}textList.forEach(e=>{const t=document.createElement("canvas");const n=t.getContext("2d");t.width=256;t.height=256;n.font="bold 42px Microsoft YaHei";const o=50+Math.random()*205|0;const a=100+Math.random()*155|0;const r=180+Math.random()*75|0;n.fillStyle=`rgb(${o},${a},${r})`;n.textAlign="center";n.fillText(e,128,140);const i=new THREE.CanvasTexture(t);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:i,transparent:!0}));let l=getRandomSpherePosition(200);s.position.copy(l);s.scale.set(80,40,1);group.add(s)});function animate(){requestAnimationFrame(animate);group.rotation.y+=0.004;controls.update();renderer.render(scene,camera)}animate();window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)})</script></body></html>
